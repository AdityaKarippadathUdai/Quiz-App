name: Quiz Platform CI/CD Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  static-checks-and-test:
    name: Lint, Typecheck and Build Build Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-size: '20'
          node-version: 22
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Run Build and Compile Check
        run: npm run build
        env:
          NODE_ENV: production

  docker-image-validation:
    name: Verify Production Docker Image Build
    runs-on: ubuntu-latest
    needs: [ static-checks-and-test ]

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Local Production Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: quiz-platform:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
