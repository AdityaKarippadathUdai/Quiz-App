version: '3.8'

services:
  # Database Service (MongoDB)
  mongodb:
    image: mongo:6.0-focal
    container_name: quiz_platform_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: quiz_platform
    volumes:
      - mongodb_data:/data/db
    networks:
      - quiz_platform_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache & Real-Time Sync Service (Redis)
  redis:
    image: redis:7.2-alpine
    container_name: quiz_platform_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - quiz_platform_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Core Full-Stack Application
  quiz-platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quiz_platform_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/quiz_platform
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=production_grade_ultra_secure_jwt_secret_token
      - APP_URL=http://localhost:3000
      # Cloudinary variables (leave blank for local mock file fallback)
      - CLOUDINARY_CLOUD_NAME=
      - CLOUDINARY_API_KEY=
      - CLOUDINARY_API_SECRET=
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quiz_platform_net

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  quiz_platform_net:
    driver: bridge
